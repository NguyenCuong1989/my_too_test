[pytest]
testpaths = tests axcontrol/tests
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*
addopts =
    --cov=src
    --cov=autonomous_operator
    --cov=axcontrol
    --cov-report=term-missing
    --cov-report=xml:coverage.xml
    --cov-report=html:htmlcov
    --cov-fail-under=70
asyncio_mode = auto
