name: Code Coverage

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  coverage:
    name: Run Tests & Generate Coverage Report
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install test dependencies
        run: pip install -r requirements-test.txt

      - name: Run tests with coverage
        run: |
          pytest \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-report=html:htmlcov \
            --cov-fail-under=70 \
            -v
        continue-on-error: true

      - name: Run axcontrol no-drift tests
        env:
          AXCONTROL_SIM: "1"
        working-directory: axcontrol
        run: |
          pip install -r requirements-test.txt 2>/dev/null || true
          python3 -m pytest tests/test_bridge_no_drift.py -v
        continue-on-error: true

      - name: Upload coverage XML report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            coverage.xml
            htmlcov/
          retention-days: 30

      - name: Extract coverage percentage
        continue-on-error: true
        run: |
          COVERAGE=$(python3 -c "
          import xml.etree.ElementTree as ET
          tree = ET.parse('coverage.xml')
          root = tree.getroot()
          pct = float(root.attrib.get('line-rate', 0)) * 100
          print(f'{pct:.0f}')
          " 2>/dev/null || echo "0")
          echo "COVERAGE_PCT=$COVERAGE" >> $GITHUB_ENV
          if [ "$COVERAGE" -ge 70 ]; then
            echo "COVERAGE_COLOR=green" >> $GITHUB_ENV
          elif [ "$COVERAGE" -ge 50 ]; then
            echo "COVERAGE_COLOR=yellow" >> $GITHUB_ENV
          else
            echo "COVERAGE_COLOR=red" >> $GITHUB_ENV
          fi

      - name: Generate coverage badge
        uses: Schneegans/dynamic-badges-action@v1.7.0
        continue-on-error: true
        with:
          auth: ${{ secrets.GIST_SECRET }}
          gistID: coverage-badge
          filename: coverage-badge.json
          label: coverage
          message: ${{ env.COVERAGE_PCT }}%
          color: ${{ env.COVERAGE_COLOR }}

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        continue-on-error: true
        with:
          files: coverage.xml
          flags: unittests
          fail_ci_if_error: false
          verbose: true

      - name: Post coverage summary to PR
        uses: MishaKav/pytest-coverage-comment@main
        continue-on-error: true
        if: github.event_name == 'pull_request'
        with:
          pytest-xml-coverage-path: coverage.xml
          title: "Coverage Report"
          badge-title: "Coverage"
          hide-badge: false
          hide-report: false
          create-new-comment: false
          hide-comment: false
          report-only-changed-files: false
          junitxml-path: ""
          default-branch: main
          multiple-files: |
            Main, coverage.xml
