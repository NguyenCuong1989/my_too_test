name: Type Safety

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  type-check:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Pyre
        run: |
          python -m pip install --upgrade pip
          pip install pyre-check

      - name: Run Pyre type checking
        run: |
          pyre --source-directory axcontrol check || true
        continue-on-error: true
